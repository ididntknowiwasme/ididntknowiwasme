backend:
  name: git-gateway
  branch: main

publish_mode: simple
media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Author", name: "author", widget: "string" }
      - label: "Tag"
        name: "tag"
        widget: "select"
        options: ["Identity", "Faith", "Purpose", "Discipleship", "Surrender", "Word of God", "Community", "Testimony"]
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "1-2 sentence summary shown on the blog grid" }
      - { label: "Cover Image", name: "image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
